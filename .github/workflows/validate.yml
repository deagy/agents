name: validate

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"
      - run: pip install --no-cache-dir --require-hashes -r .github/requirements-validation.lock
      - run: python -B -m unittest discover -s agents/orchestration/test -p "test_*.py"
      - run: python -B -m unittest discover -s agents/knowledge-store/test -p "test_*.py"
      - run: python -B -m unittest discover -s plugins/agentic-sdlc/test -p "test_*.py"
      - run: ./bin/agents help
      - run: ./bin/agents select --task "CI wrapper smoke test" --files README.md --classification internal --task-id CI-SMOKE-1 >/dev/null

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - run: >
          docker run --rm -v "$PWD:/repo"
          zricethezav/gitleaks:v8.30.0@sha256:691af3c7c5a48b16f187ce3446d5f194838f91238f27270ed36eef6359a574d9
          detect --no-git --redact --source /repo
