apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sample-001-bff
  labels:
    {{- include "sample-001.labels" . | nindent 4 }}
  annotations:
    sample-001.example/render-only: "true"
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: {name: sample-001-bff, port: {name: http}}
