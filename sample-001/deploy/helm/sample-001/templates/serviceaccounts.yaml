{{- $root := . -}}
{{- range $name := list "bff" "api" "scanner" "promotion" "deletion" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sample-001-{{ $name }}
  labels:
    {{- include "sample-001.labels" $root | nindent 4 }}
    app.kubernetes.io/name: sample-001-{{ $name }}
automountServiceAccountToken: false
---
{{- end }}
