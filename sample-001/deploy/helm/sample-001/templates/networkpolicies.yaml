apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sample-001-default-deny
  labels:
    {{- include "sample-001.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {app.kubernetes.io/part-of: sample-001}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sample-001-allow-dns
  labels:
    {{- include "sample-001.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {app.kubernetes.io/part-of: sample-001}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: kube-system}}
          podSelector: {matchLabels: {k8s-app: kube-dns}}
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sample-001-bff-ingress
  labels:
    {{- include "sample-001.labels" . | nindent 4 }}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: sample-001-bff}}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: {matchLabels: {kubernetes.io/metadata.name: ingress-system}}
      ports: [{protocol: TCP, port: 8080}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sample-001-api-from-bff
  labels:
    {{- include "sample-001.labels" . | nindent 4 }}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: sample-001-api}}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: {matchLabels: {app.kubernetes.io/name: sample-001-bff}}
      ports: [{protocol: TCP, port: 8081}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sample-001-bff-egress
  labels:
    {{- include "sample-001.labels" . | nindent 4 }}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: sample-001-bff}}
  policyTypes: [Egress]
  egress:
    - to: [{podSelector: {matchLabels: {app.kubernetes.io/name: sample-001-api}}}]
      ports: [{protocol: TCP, port: 8081}]
    - to: [{ipBlock: {cidr: {{ .Values.network.identityCidr | quote }}}}]
      ports: [{protocol: TCP, port: 443}]
    - to: [{ipBlock: {cidr: {{ .Values.network.databaseCidr | quote }}}}]
      ports: [{protocol: TCP, port: 5432}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sample-001-data-egress
  labels:
    {{- include "sample-001.labels" . | nindent 4 }}
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values: [sample-001-api, sample-001-scanner, sample-001-promotion, sample-001-deletion]
  policyTypes: [Egress]
  egress:
    - to: [{ipBlock: {cidr: {{ .Values.network.databaseCidr | quote }}}}]
      ports: [{protocol: TCP, port: 5432}]
    - to: [{ipBlock: {cidr: {{ .Values.network.objectStorageCidr | quote }}}}]
      ports: [{protocol: TCP, port: 443}]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sample-001-scanner-egress
  labels:
    {{- include "sample-001.labels" . | nindent 4 }}
spec:
  podSelector: {matchLabels: {app.kubernetes.io/name: sample-001-scanner}}
  policyTypes: [Egress]
  egress:
    - to: [{ipBlock: {cidr: {{ .Values.network.scannerCidr | quote }}}}]
      ports: [{protocol: TCP, port: 443}]
